<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Ký Tập Luyện - Mai Việt Taekwondo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
    .main-card { max-width: 650px; margin: 30px auto; border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    .header-banner { background: #0d6efd; color: white; padding: 25px; border-radius: 15px 15px 0 0; text-align: center; }
    .section-label { font-weight: bold; color: #0d6efd; border-bottom: 2px solid #e9ecef; padding-bottom: 5px; margin-top: 20px; }
    .btn-submit { padding: 12px; font-weight: bold; font-size: 1.1rem; border-radius: 8px; }
  </style>
</head>
<body>

<div class="card main-card">
  <div class="header-banner">
    <h3>ĐƠN ĐĂNG KÝ NHẬP HỌC</h3>
    <p class="mb-0">Hệ Thống Quản Lý Mai Việt Taekwondo</p>
  </div>
  
  <div class="card-body p-4">
    <form id="taekwondoForm">
      <p class="section-label">I. THÔNG TIN HỌC VIÊN</p>
      <div class="mb-3">
        <label class="form-label">Họ và tên:</label>
        <input type="text" name="HOTEN" class="form-control" placeholder="Nguyễn Văn Anh" required>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Ngày sinh:</label>
          <input type="text" name="NGAYSINH" class="form-control" placeholder="01/01/2015" required>

          <!--
          <input type="date" id="NGAYSINH" name="NGAYSINH" class="form-control" required>
          -->
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Thể chất (Cao-Nặng):</label>
          <input type="text" name="THECHAT" class="form-control" placeholder="1m40 - 35kg" required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Địa chỉ cư trú:</label>
        <input type="text" name="DIACHI" class="form-control" placeholder="Số nhà, tên đường..." required>
      </div>

      <p class="section-label">II. THÔNG TIN PHỤ HUYNH</p>
      <div class="row">
        <div class="col-md-6 mb-3 border-end">
          <label class="form-label text-primary">Thông tin Cha:</label>
          <input type="text" name="CHA" class="form-control mb-2" placeholder="Họ tên Cha">
          <input type="number" name="TUOICHA" class="form-control" placeholder="Tuổi">
          <input type="text" name="NGHECHA" class="form-control mb-2" placeholder="Nghề nghiệp của Cha">
          <input type="text" name="SDTCHA" class="form-control" placeholder="SĐT Cha">
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label text-danger">Thông tin Mẹ:</label>
          <input type="text" name="ME" class="form-control mb-2" placeholder="Họ tên Mẹ">
          <input type="number" name="TUOIME" class="form-control" placeholder="Tuổi">
          <input type="text" name="NGHEME" class="form-control mb-2" placeholder="Nghề nghiệp của Mẹ">
          <input type="text" name="SDTME" class="form-control" placeholder="SĐT Mẹ">
        </div>
      </div>

      <div class="form-check mb-4 mt-3">
        <input class="form-check-input" type="checkbox" name="CAMKET" value="Tôi đã cam kết" id="check" required>
        <label class="form-check-label" for="check">Tôi cam kết tuân thủ mọi quy định của võ đường.</label>
      </div>

      <button type="submit" id="btnSubmit" class="btn btn-primary w-100 btn-submit">GỬI ĐƠN ĐĂNG KÝ</button>
    </form>
    
    <div id="statusBox" class="mt-4 text-center" style="display:none;">
      <div id="loader" class="spinner-border text-primary mb-2" role="status"></div>
      <div id="msgText" class="alert"></div>
    </div>
  </div>
</div>

<script>
  // QUAN TRỌNG: Thay URL này bằng URL Web App của bạn sau khi Deploy
  const API_URL = "https://script.google.com/macros/s/AKfycbx9XdM0ULgQp2DBhAyUnp1EqSt_UvoKaFRuqVhwLxIMENWKIk-o1ENBGF77dfEHo1bT/exec";

  document.getElementById('taekwondoForm').onsubmit = async function(e) {
    e.preventDefault();
    
    const btn = document.getElementById('btnSubmit');
    const statusBox = document.getElementById('statusBox');
    const msgText = document.getElementById('msgText');
    const loader = document.getElementById('loader');

    // Chế độ chờ
    btn.disabled = true;
    statusBox.style.display = 'block';
    loader.style.display = 'inline-block';
    msgText.className = "alert alert-info";
    msgText.innerText = "Đang tạo hồ sơ cho học viên";
    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        mode: 'no-cors', // Dùng no-cors để tránh lỗi bảo mật khi gọi Apps Script trực tiếp
        body: JSON.stringify(data),
        headers: { 'Content-Type': 'application/json' }
      });

      // Lưu ý: no-cors sẽ không trả về kết quả JSON, nhưng dữ liệu vẫn được gửi đi
      msgText.className = "alert alert-success";
      msgText.innerHTML = "<h4>GỬI ĐƠN THÀNH CÔNG!</h4><p>Xin chúc mừng học viên " + data.HOTEN + " là thành viên mới của võ đường Mai Việt.</p>";
      loader.style.display = 'none';
      this.reset();
      
    } catch (error) {
      msgText.className = "alert alert-danger";
      msgText.innerText = "Lỗi kết nối: " + error.message;
      loader.style.display = 'none';
    } finally {
      btn.disabled = false;
    }
  };
</script>

</body>
</html>
